name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-experts-core
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, Windows, experts-core]
    timeout-minutes: 20
    steps:
      - name: Run deploy script
        shell: powershell
        run: C:\deploy\deploy-experts-core.ps1
